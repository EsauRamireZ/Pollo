<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Agregar Producto</title>

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

<style>

.form-container{
width:400px;
margin:50px auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0px 3px 10px rgba(0,0,0,0.2);
}

.form-container input,
.form-container textarea{

width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;

}

.btn-guardar{

background:#28a745;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;

}

.btn-volver{

text-decoration:none;
margin-left:10px;

}

</style>

</head>

<body>

<div class="form-container">

<h2>Agregar Producto</h2>

<form method="POST">

<label>Nombre</label>
<input type="text" name="nombre" required maxlength="40">

<label>Precio</label>
<input type="number" step="0.01" name="precio" required max="9999999999">

<label>Stock</label>
<input type="number" name="stock" required max="9999999999">

<label>Descripción</label>
<textarea name="descripcion" maxlength="40"></textarea>

<button class="btn-guardar">
Guardar Producto
</button>

<a href="/productos" class="btn-volver">
Cancelar
</a>

</form>

</div>

</body>
</html>
